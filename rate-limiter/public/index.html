<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rate Limiter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e5e5e5;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #555;
      margin-bottom: 32px;
    }

    /* Quota bar */
    .quota {
      margin-bottom: 28px;
    }

    .quota-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .quota-label {
      font-size: 0.78rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .quota-count {
      font-size: 1.4rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      transition: color 0.2s;
    }

    .quota-count.ok    { color: #4ade80; }
    .quota-count.low   { color: #facc15; }
    .quota-count.empty { color: #f87171; }

    .bar-track {
      height: 6px;
      background: #1e1e1e;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .bar-fill.ok    { background: #4ade80; }
    .bar-fill.low   { background: #facc15; }
    .bar-fill.empty { background: #f87171; }

    /* Send button */
    .send-btn {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 20px;
    }

    .send-btn:hover    { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Log */
    .log-label {
      font-size: 0.75rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .log {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 240px;
      overflow-y: auto;
    }

    .log-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 0.82rem;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .badge.ok    { background: #14532d; color: #4ade80; }
    .badge.block { background: #450a0a; color: #f87171; }

    .log-msg { color: #aaa; flex: 1; }
    .log-time { color: #444; font-size: 0.75rem; flex-shrink: 0; }

    /* Reset timer */
    .reset-info {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #444;
      text-align: center;
    }

    .reset-info span { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Rate Limiter</h1>
    <p class="subtitle">5 requests per 60 seconds · Sliding Window · per IP</p>

    <div class="quota">
      <div class="quota-header">
        <span class="quota-label">Requests remaining</span>
        <span class="quota-count ok" id="count">5</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill ok" id="bar" style="width:100%"></div>
      </div>
    </div>

    <button class="send-btn" id="sendBtn" onclick="sendRequest()">Send Request</button>

    <p class="log-label">Request Log</p>
    <div class="log" id="log"></div>

    <p class="reset-info" id="resetInfo"></p>
  </div>

  <script>
    const MAX = 5;
    let remaining = MAX;
    let resetTimer = null;
    let secondsLeft = 0;

    const countEl   = document.getElementById('count');
    const barEl     = document.getElementById('bar');
    const sendBtn   = document.getElementById('sendBtn');
    const logEl     = document.getElementById('log');
    const resetInfo = document.getElementById('resetInfo');

    function setLevel(n) {
      const level = n > 2 ? 'ok' : n > 0 ? 'low' : 'empty';
      countEl.className = `quota-count ${level}`;
      barEl.className   = `bar-fill ${level}`;
      barEl.style.width = `${(n / MAX) * 100}%`;
      countEl.textContent = n;
    }

    function addLog(ok, message) {
      const now = new Date().toLocaleTimeString('en-US', { hour12: false });
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `
        <span class="badge ${ok ? 'ok' : 'block'}">${ok ? '200' : '429'}</span>
        <span class="log-msg">${message}</span>
        <span class="log-time">${now}</span>
      `;
      logEl.prepend(entry);
    }

    function startResetCountdown(seconds) {
      clearInterval(resetTimer);
      secondsLeft = seconds;
      resetInfo.textContent = `1 slot frees in ${secondsLeft}s`;
      resetTimer = setInterval(async () => {
        secondsLeft--;
        if (secondsLeft <= 0) {
          clearInterval(resetTimer);
          resetInfo.textContent = '';
          // Re-poll the server to get the real remaining count —
          // sliding window freed exactly 1 slot, not all 5
          await syncState();
        } else {
          resetInfo.textContent = `1 slot frees in ${secondsLeft}s`;
        }
      }, 1000);
    }

    // Poll current state from the server without consuming a request slot
    async function syncState() {
      try {
        const res = await fetch('/api/status');
        const rem = parseInt(res.headers.get('x-ratelimit-remaining') ?? String(MAX), 10);
        remaining = rem;
        setLevel(remaining);
        if (remaining > 0) {
          sendBtn.disabled = false;
          sendBtn.textContent = 'Send Request';
        }
      } catch {}
    }

    async function sendRequest() {
      sendBtn.disabled = true;
      try {
        const res = await fetch('/api/hello');
        const rem    = parseInt(res.headers.get('x-ratelimit-remaining') ?? '0', 10);
        // X-RateLimit-Reset is set by the server on both the last allowed request
        // (remaining = 0) AND on 429 responses — always anchored to oldest entry
        const resetSec = parseInt(res.headers.get('x-ratelimit-reset') ?? '0', 10);

        if (res.ok) {
          remaining = rem;
          setLevel(remaining);
          addLog(true, `GET /api/hello — ${remaining} request${remaining !== 1 ? 's' : ''} left`);
          if (remaining > 0) {
            sendBtn.disabled = false;
          } else {
            // 5th request just used the last slot — start countdown from header value
            sendBtn.textContent = 'Limit reached';
            startResetCountdown(resetSec || 60);
          }
        } else {
          const data = await res.json();
          remaining = 0;
          setLevel(0);
          sendBtn.textContent = 'Limit reached';
          addLog(false, `Too Many Requests — retry in ${data.retryAfter}s`);
          startResetCountdown(data.retryAfter || resetSec || 60);
        }
      } catch {
        addLog(false, 'Network error');
        sendBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
