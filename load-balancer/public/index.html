<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Load Balancer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e5e5e5;
      padding: 40px 24px;
    }

    .container { max-width: 600px; margin: 0 auto; }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #555;
      margin-bottom: 36px;
    }

    /* Stats row */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 0.72rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* Server cards */
    .servers { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

    .server-card {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 14px 16px;
      transition: border-color 0.2s;
    }

    .server-card.active { border-color: #4ade80; }
    .server-card.down   { opacity: 0.45; }

    .server-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.up   { background: #4ade80; }
    .dot.down { background: #f87171; }

    .server-name { font-size: 0.9rem; font-weight: 500; flex: 1; }
    .server-port { font-size: 0.78rem; color: #444; }
    .server-count {
      font-size: 1rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 28px;
      text-align: right;
    }

    /* Distribution bar */
    .bar-track {
      height: 5px;
      background: #222;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .bar-fill.s1 { background: #60a5fa; }
    .bar-fill.s2 { background: #a78bfa; }
    .bar-fill.s3 { background: #34d399; }

    .bar-pct {
      font-size: 0.72rem;
      color: #444;
      margin-top: 5px;
      text-align: right;
    }

    /* Buttons */
    .actions { display: flex; gap: 8px; margin-bottom: 24px; }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover    { opacity: 0.85; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-primary  { background: #fff; color: #000; }
    .btn-burst    { background: #1a1a1a; color: #e5e5e5; border: 1px solid #2a2a2a; }

    /* Log */
    .log-label {
      font-size: 0.75rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .log { display: flex; flex-direction: column; gap: 5px; max-height: 220px; overflow-y: auto; }

    .log-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.82rem;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; } }

    .log-server {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .log-server.s1 { background: #1e3a5f; color: #60a5fa; }
    .log-server.s2 { background: #2e1f5e; color: #a78bfa; }
    .log-server.s3 { background: #064e3b; color: #34d399; }

    .log-msg  { color: #666; flex: 1; }
    .log-time { color: #333; font-size: 0.75rem; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Load Balancer</h1>
    <p class="subtitle">Round Robin · 3 backend servers · health checks every 10s</p>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <p class="stat-label">Total Requests</p>
        <p class="stat-value" id="totalRequests">0</p>
      </div>
      <div class="stat">
        <p class="stat-label">Healthy Servers</p>
        <p class="stat-value" id="healthyCount">3</p>
      </div>
    </div>

    <!-- Server cards -->
    <div class="servers" id="servers"></div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" onclick="sendOne()">Send Request</button>
      <button class="btn btn-burst" onclick="sendBurst()">Burst ×10</button>
    </div>

    <!-- Log -->
    <p class="log-label">Routing Log</p>
    <div class="log" id="log"></div>
  </div>

  <script>
    const COLORS = ['s1', 's2', 's3'];

    let state = { totalRequests: 0, servers: [] };

    // ── Render ────────────────────────────────────────────────────────────────
    function render(data) {
      state = data;
      document.getElementById('totalRequests').textContent = data.totalRequests;
      document.getElementById('healthyCount').textContent =
        data.servers.filter(s => s.healthy).length;

      const total = data.servers.reduce((s, srv) => s + srv.requests, 0) || 1;
      const container = document.getElementById('servers');
      container.innerHTML = '';

      data.servers.forEach((srv, i) => {
        const pct = total > 0 ? ((srv.requests / total) * 100).toFixed(1) : '0.0';
        const color = COLORS[i];
        const card = document.createElement('div');
        card.className = `server-card ${!srv.healthy ? 'down' : ''}`;
        card.id = `card-${srv.id}`;
        card.innerHTML = `
          <div class="server-top">
            <span class="dot ${srv.healthy ? 'up' : 'down'}"></span>
            <span class="server-name">Server ${srv.id}</span>
            <span class="server-port">${srv.url}</span>
            <span class="server-count">${srv.requests}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill ${color}" style="width:${pct}%"></div>
          </div>
          <p class="bar-pct">${pct}%</p>
        `;
        container.appendChild(card);
      });
    }

    // ── Poll status every 2s ──────────────────────────────────────────────────
    async function poll() {
      try {
        const res = await fetch('/_lb/status');
        const data = await res.json();
        render(data);
      } catch {}
    }

    setInterval(poll, 2000);
    poll();

    // ── Flash active card ─────────────────────────────────────────────────────
    function flashCard(serverId) {
      const card = document.getElementById(`card-${serverId}`);
      if (card) {
        card.classList.add('active');
        setTimeout(() => card.classList.remove('active'), 400);
      }
    }

    // ── Add log entry ─────────────────────────────────────────────────────────
    function addLog(serverId, reqNum) {
      const now = new Date().toLocaleTimeString('en-US', { hour12: false });
      const color = COLORS[serverId - 1];
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `
        <span class="log-server ${color}">S${serverId}</span>
        <span class="log-msg">Request #${reqNum} routed to Server ${serverId}</span>
        <span class="log-time">${now}</span>
      `;
      const log = document.getElementById('log');
      log.prepend(entry);
      if (log.children.length > 50) log.lastElementChild.remove();
    }

    // ── Send single request ───────────────────────────────────────────────────
    async function sendOne() {
      try {
        const res = await fetch('/_lb/send');
        const data = await res.json();
        if (data.routedTo) {
          addLog(data.routedTo, data.requestNumber);
          flashCard(data.routedTo);
          await poll();
        }
      } catch {
        addLog('?', '?');
      }
    }

    // ── Burst ×10 ─────────────────────────────────────────────────────────────
    async function sendBurst() {
      for (let i = 0; i < 10; i++) {
        await sendOne();
        await new Promise(r => setTimeout(r, 80));
      }
    }
  </script>
</body>
</html>
